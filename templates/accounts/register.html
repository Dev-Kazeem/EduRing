{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Sign Up as {{ role }}{% endblock %}
{% block content %}


<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-3 text-center">Create your {{ role }} account</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Sign Up</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Already have an account? <a href="{% url 'accounts:login' %}">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
