{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Login{% endblock %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-3 pb-4 text-center fw-bold">Welcome back</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Don't have an account yet? <a class="text-primary" href="{% url 'accounts:register_landing' %}">Sign-up </a> Here
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
