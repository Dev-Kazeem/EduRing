{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Resend Verification Email{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-3">Resend verification email</h3>
                <p class="text-muted">Enter the email you signed up with and we'll send a fresh link.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Send Link</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    <a href="{% url 'accounts:login' %}">Back to login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
